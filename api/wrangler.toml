name = "sfl-api"
main = "src/index.js"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "sfl-db"
database_id = "d1968d0f-a984-4fd2-bf4e-c2e0d70f242b"

[[r2_buckets]]
binding = "R2"
bucket_name = "sfl-data"

[ai]
binding = "AI"

[vars]
# API_KEY is set via: wrangler secret put API_KEY
# G8 saved-searches:
#   WEBHOOK_URL  — where new-match POSTs land (sfl-hook on Sleeper)
#   SAVED_SEARCH_ENABLED — killswitch; flip to "true" to enable the daily cron push
#   SFL_WEBHOOK_SECRET is set via: wrangler secret put SFL_WEBHOOK_SECRET
WEBHOOK_URL = "https://sleeper.phareim.no/sfl-hook/saved-search-hit"
SAVED_SEARCH_ENABLED = "false"

[triggers]
# 06:00 UTC daily, ~30 min before the daily brief on Sleeper.
crons = ["0 6 * * *"]
